<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InTracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header id="app-header">
        <div class="header-top">
            <h1>InTracker</h1>
            <div class="header-actions">
                <button id="btn-truck-stock" class="btn-icon" title="My Truck Stock" disabled>&#128666; Truck</button>
                <button id="btn-transactions" class="btn-icon" title="Transaction Log" disabled>&#9776; Log</button>
            </div>
        </div>
        <!-- Name Banner -->
        <div id="name-banner" class="name-banner required">
            <label for="input-user">Your Name <span class="required-star">&#9733; Required</span></label>
            <input type="text" id="input-user" placeholder="Enter your name to begin..." autocomplete="name" maxlength="60">
        </div>
    </header>

    <!-- Location Bar -->
    <div id="location-bar" class="location-bar locked">
        <select id="select-location" disabled>
            <option value="">— Select a Location —</option>
        </select>
        <button id="btn-new-location" class="btn-secondary" disabled>+ New</button>
    </div>

    <!-- Main Views -->
    <main id="main-content">

        <!-- Splash / prompt -->
        <div id="view-splash" class="view active">
            <div class="splash-message">
                <div class="splash-icon">&#128230;</div>
                <p id="splash-text">Enter your name above to get started.</p>
            </div>
        </div>

        <!-- Inventory View -->
        <div id="view-inventory" class="view">
            <div id="truck-mode-banner" class="hidden">&#128666; Truck Stock &mdash; <span id="truck-mode-name"></span></div>
            <div id="search-bar">
                <input type="search" id="input-search" placeholder="&#128269; Search part number or description..." />
            </div>
            <div id="filter-sort-bar">
                <select id="select-equipment-filter">
                    <option value="">All Equipment</option>
                </select>
                <select id="select-sort">
                    <option value="default">Order: Default</option>
                    <option value="pn-asc">Part # A→Z</option>
                    <option value="pn-desc">Part # Z→A</option>
                    <option value="qty-asc">Qty Low→High</option>
                    <option value="qty-desc">Qty High→Low</option>
                    <option value="desc-asc">Name A→Z</option>
                    <option value="desc-desc">Name Z→A</option>
                    <option value="equip-asc">Equipment A→Z</option>
                </select>                <button id="btn-reorder" class="btn-reorder" title="Download CSV of parts below par level">&#8595; Reorder</button>
                <label id="lbl-upload-orders" class="btn-upload-orders" title="Upload a PO CSV to add on-order quantities">
                    &#8679; Upload PO
                    <input type="file" id="input-orders-csv" accept=".csv" style="display:none">
                </label>
            </div>
            <div id="parts-list-header">
                <span>Part # / Description</span>
                <span>Par</span>
                <span>On Order</span>
                <span>Shed QTY on Hand</span>
            </div>
            <div id="parts-list"></div>
            <div id="no-results" class="hidden">No parts match your search.</div>
        </div>

        <!-- Transaction Log View -->
        <div id="view-transactions" class="view">
            <div class="txn-header">
                <h2>Transaction Log</h2>
                <button id="btn-back" class="btn-secondary">&#8592; Back</button>
            </div>
            <div class="txn-filters">
                <input type="search" id="txn-search-user" placeholder="Filter by name..." />
                <input type="search" id="txn-search-part" placeholder="Filter by part #..." />
            </div>
            <div id="txn-list"></div>
            <div id="txn-pagination" class="pagination"></div>
        </div>

    </main>

    <!-- New Location Modal -->
    <div id="modal-new-location" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-box">
            <div class="modal-title">New Location</div>
            <p class="modal-hint">A new inventory list will be created and pre-filled from the master parts list at 0 qty.</p>
            <input type="text" id="input-new-location" placeholder="Location name..." maxlength="60" />
            <div id="new-loc-error" class="modal-error hidden"></div>
            <div class="modal-actions">
                <button id="btn-new-loc-confirm" class="btn-primary">Create</button>
                <button id="btn-new-loc-cancel" class="btn-ghost">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Transfer Modal -->
    <div id="modal-transfer" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-box">
            <div class="modal-title">Transfer Part</div>
            <p class="modal-hint"><span id="transfer-pn-display" style="font-weight:700;color:var(--accent)"></span></p>
            <div class="transfer-direction">
                <label class="transfer-dir-opt">
                    <input type="radio" name="transfer-dir" id="transfer-dir-out" value="truck-to-loc" checked>
                    Truck &rarr; Location
                </label>
                <label class="transfer-dir-opt">
                    <input type="radio" name="transfer-dir" id="transfer-dir-in" value="loc-to-truck">
                    Location &rarr; Truck
                </label>
            </div>
            <select id="select-transfer-location">
                <option value="">&#8212; Select Location &#8212;</option>
            </select>
            <label class="modal-field-label" for="input-transfer-qty">Quantity</label>
            <input type="number" id="input-transfer-qty" min="1" value="1">
            <div id="transfer-error" class="modal-error hidden"></div>
            <div class="modal-actions">
                <button id="btn-transfer-confirm" class="btn-primary">Transfer</button>
                <button id="btn-transfer-cancel" class="btn-ghost">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="js/app.js"></script>
</body>
</html>
